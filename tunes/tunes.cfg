# MuSaiCa stepper-music jingles for Snapmaker U1 (Klipper).
#
# Upload this file once to the printer via Mainsail's config editor, then
# add `[include tunes.cfg]` to your printer.cfg. The slicer's
# `print_completion_tune` dropdown injects the matching PLAY_* call into
# the machine end-G-code.
#
# Physics: a stepper at feedrate F mm/min on an axis with S steps/mm
# emits a square wave at F * S / 60 Hz. So for a target frequency f:
#     F = f * 60 / S   (mm/min)
# Direction is alternated each note so net displacement is ~0.
#
# >>> CALIBRATE BEFORE FIRST USE <<<
# Set STEPS_PER_MM below to the actual X-axis steps/mm of the U1
# (rotation_distance / microsteps math from printer.cfg). The default
# 80 is a typical CoreXY value — confirm against the real config and
# tune until notes match a tuner within ±10 cents (Milestone M1).

[gcode_macro _MUSAICA_CFG]
variable_steps_per_mm: 80.0      # X-axis steps/mm — calibrate per hardware
variable_note_axis: "X"          # axis to play on; swap to "E" to use the extruder
variable_amplitude_mm: 2.0       # max travel per note before direction flip
gcode:

# ---------------------------------------------------------------------------
# PLAY_NOTE FREQ=<hz> MS=<duration_ms>
# Plays a single note by moving the configured axis at the matching feedrate.
# ---------------------------------------------------------------------------
[gcode_macro PLAY_NOTE]
gcode:
    {% set cfg   = printer["gcode_macro _MUSAICA_CFG"] %}
    {% set spmm  = cfg.steps_per_mm|float %}
    {% set axis  = cfg.note_axis %}
    {% set amp   = cfg.amplitude_mm|float %}
    {% set freq  = params.FREQ|float %}
    {% set ms    = params.MS|default(150)|float %}
    {% if freq <= 0 %}
        G4 P{ ms|int }
    {% else %}
        {% set feed_mm_min = freq * 60.0 / spmm %}
        {% set travel_mm   = feed_mm_min * (ms / 1000.0) / 60.0 %}
        {% set travel_mm   = [travel_mm, amp]|min %}
        G91
        G1 { axis }{ "%.4f"|format(travel_mm) }  F{ "%.2f"|format(feed_mm_min) }
        G1 { axis }-{ "%.4f"|format(travel_mm) } F{ "%.2f"|format(feed_mm_min) }
        G90
    {% endif %}

# ---------------------------------------------------------------------------
# Mario 1-Up: E5 G5 E6 C6 D6 G6
# Frequencies via A4=440 Hz equal temperament.
# ---------------------------------------------------------------------------
[gcode_macro PLAY_1UP]
gcode:
    PLAY_NOTE FREQ=659.25  MS=130   ; E5
    PLAY_NOTE FREQ=783.99  MS=130   ; G5
    PLAY_NOTE FREQ=1318.51 MS=130   ; E6
    PLAY_NOTE FREQ=1046.50 MS=130   ; C6
    PLAY_NOTE FREQ=1174.66 MS=130   ; D6
    PLAY_NOTE FREQ=1567.98 MS=260   ; G6

# ---------------------------------------------------------------------------
# Zelda chest open: G4 F#4 G4 D5 (rough, classic four-note flourish).
# ---------------------------------------------------------------------------
[gcode_macro PLAY_ZELDA_CHEST]
gcode:
    PLAY_NOTE FREQ=392.00 MS=140   ; G4
    PLAY_NOTE FREQ=369.99 MS=140   ; F#4
    PLAY_NOTE FREQ=392.00 MS=140   ; G4
    PLAY_NOTE FREQ=587.33 MS=500   ; D5

# ---------------------------------------------------------------------------
# Sad trombone: descending C4 B3 Bb3 A3
# ---------------------------------------------------------------------------
[gcode_macro PLAY_SAD_TROMBONE]
gcode:
    PLAY_NOTE FREQ=261.63 MS=200   ; C4
    PLAY_NOTE FREQ=246.94 MS=200   ; B3
    PLAY_NOTE FREQ=233.08 MS=200   ; Bb3
    PLAY_NOTE FREQ=220.00 MS=500   ; A3

# ---------------------------------------------------------------------------
# END_PRINT wrapper — call this from the slicer's machine end-G-code.
# Pass TUNE=1up|zelda_chest|sad_trombone|none to pick a jingle.
# ---------------------------------------------------------------------------
[gcode_macro END_PRINT]
gcode:
    {% set tune = params.TUNE|default("1up")|string %}
    # ... user's existing end-of-print routine goes here (park, cool, etc.)
    {% if tune == "1up" %}
        PLAY_1UP
    {% elif tune == "zelda_chest" %}
        PLAY_ZELDA_CHEST
    {% elif tune == "sad_trombone" %}
        PLAY_SAD_TROMBONE
    {% endif %}
